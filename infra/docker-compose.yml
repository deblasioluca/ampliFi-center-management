version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-amplifi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amplifi}
      POSTGRES_DB: ${POSTGRES_DB:-amplifi_cleanup}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amplifi"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_WEB_PORT:-8125}:8025"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_PORT:-9101}:9001"
    volumes:
      - miniodata:/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8180}:8080"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-amplifi}:${POSTGRES_PASSWORD:-amplifi}@postgres:5432/${POSTGRES_DB:-amplifi_cleanup}
      DATABASE_ASYNC_URL: postgresql+asyncpg://${POSTGRES_USER:-amplifi}:${POSTGRES_PASSWORD:-amplifi}@postgres:5432/${POSTGRES_DB:-amplifi_cleanup}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-amplifi}:${POSTGRES_PASSWORD:-amplifi}@postgres:5432/${POSTGRES_DB:-amplifi_cleanup}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app:celery worker -l info -Q default,ml,llm,email,odata

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4321}:4321"
    environment:
      PUBLIC_API_URL: http://backend:8080/api
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  pgdata:
  miniodata:
